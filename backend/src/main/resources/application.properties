# ========================================
# SPRING BOOT CONFIGURATION
# ========================================

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# ========================================
# POSTGRESQL DATABASE CONFIGURATION
# ========================================

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/lampify_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ========================================
# JPA & HIBERNATE CONFIGURATION
# ========================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Hibernate Performance Settings
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ========================================
# FLYWAY DATABASE MIGRATIONS
# ========================================

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history
spring.flyway.validate-on-migrate=true

# ========================================
# JWT CONFIGURATION
# ========================================

app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# ========================================
# CORS CONFIGURATION
# ========================================

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin
app.cors.allow-credentials=true

# ========================================
# LOGGING CONFIGURATION
# ========================================

logging.level.com.lampify=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log pattern for better readability
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%-5level) %clr([%thread]){cyan} %clr(%logger{36}){yellow} - %msg%n

# ========================================
# EMAIL CONFIGURATION (For password recovery)
# ========================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ========================================
# RATE LIMITING CONFIGURATION
# ========================================

app.rate.limit.enabled=true
app.rate.limit.default-limit=100
app.rate.limit.window-duration=60

# ========================================
# GOOGLE RECAPTCHA V2 CONFIGURATION (checkbox)
# Setup guide: docs/RECAPTCHA_SETUP.md
# ========================================

app.recaptcha.enabled=${APP_RECAPTCHA_ENABLED:false}
app.recaptcha.secret-key=${RECAPTCHA_SECRET_KEY:}
app.recaptcha.verify-url=https://www.google.com/recaptcha/api/siteverify

# ========================================
# OAUTH PROVIDERS CONFIGURATION
# ========================================

app.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
app.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.oauth.google.verify-url=https://www.googleapis.com/oauth2/v3/tokeninfo

app.oauth.facebook.app-id=${FACEBOOK_APP_ID:}
app.oauth.facebook.app-secret=${FACEBOOK_APP_SECRET:}
app.oauth.facebook.verify-url=https://graph.facebook.com/me

# ========================================
# COOKIE CONFIGURATION
# ========================================

app.cookie.secure=${APP_COOKIE_SECURE:false}
app.cookie.http-only=true
app.cookie.same-site=Lax
app.cookie.max-age=604800
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ========================================

app.security.password-min-length=6
app.security.password-recovery-expiration=3600000
app.security.max-login-attempts=5
app.security.login-attempts-window=900000